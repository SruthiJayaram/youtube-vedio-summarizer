<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Register - RecapIt</title>
    <link rel="stylesheet" href="/static/styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <h1>📑 RecapIt</h1>
            <p class="tagline">RecapIt delivers AI-powered summaries for lectures, tutorials, and educational videos, helping you absorb the most important information in a fraction of the time — so you can learn faster, study smarter, and focus on what truly matters</p>
        </div>

        <div class="auth-right">
            <div class="form-toggle">
                <button id="toggle-login" class="active">Login</button>
                <button id="toggle-register">Register</button>
            </div>


            <!-- Login Form -->
            <form id="login-form" class="auth-form active" method="POST" action="/login">
    <input type="email" name="email" placeholder="Please enter your email" required>
    <input type="password" name="password" placeholder="Please enter your password" required>
    <div class="options">
        <label><input type="checkbox"> Remember Me</label>
        <a href="#">Forgot Password?</a>
    </div>
    <button type="submit" class="auth-btn">Login</button>
    <div class="or-divider">or</div>
    <button class="google-btn"><i class="fab fa-google"></i> Sign in with Google</button>
</form>


            <!-- Register Form -->
            <form id="register-form" class="auth-form" method="POST" action="/register">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit" class="auth-btn">Submit</button>
    <div class="or-divider">or</div>
    <button class="google-btn"><i class="fab fa-google"></i> Sign up with Google</button>
</form>

        </div>
    </div>

   <script src="/static/js/script.js"></script> 
</body>
</html>
